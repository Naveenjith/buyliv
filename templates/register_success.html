<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg: #0f172a;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --success: #22c55e;
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            animation: pop 0.4s ease;
        }

        h2 {
            margin: 10px 0;
        }

        .message {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .status {
            background: rgba(34,197,94,0.1);
            color: var(--success);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .info {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #2563eb;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 12px;
            color: white;
            cursor: pointer;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">Toggle Theme</div>

<div class="card">

    <div class="icon">✅</div>

    <h2>Registration Submitted</h2>

    <div class="message">
        {{ message }}
    </div>

    <div class="status">
        Status: Pending Admin Approval
    </div>

    <div class="info">
        Your account is under verification.  
        Once approved, your account will be activated and you can start earning.
    </div>

    <h5>Thank You</h5>

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark"));
}

if (localStorage.getItem("theme") === "true") {
    document.body.classList.add("dark");
}
</script>

</body>
</html>
