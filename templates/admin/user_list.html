{% extends "admin/base.html" %}

{% block content %}

<div class="container-fluid px-2 py-2">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-0 font-weight-bold">
                <i class="fas fa-users" style="color: #28a745;"></i> User Management
            </h4>
            <small class="text-muted">All registered users overview</small>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput"
                   class="form-control form-control-sm"
                   placeholder="🔍 Search users...">
        </div>
    </div>

    <!-- 🔥 FILTER BAR -->
    <div class="card shadow-sm border-0 mb-3 filter-card">
        <div class="card-body py-2">

            <div class="row align-items-center">

                <div class="col-md-3">
                    <select id="statusFilter" class="form-control form-control-sm">
                        <option value="">All Status</option>
                        <option value="true">Approved</option>
                        <option value="false">Pending</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="walletFilter" class="form-control form-control-sm">
                        <option value="">All Wallet</option>
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <button class="btn btn-sm btn-primary w-100"
                        onclick="applyFilters()">
                        <i class="fas fa-filter mr-1"></i> Apply Filters
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn btn-sm btn-outline-secondary w-100"
                        onclick="resetFilters()">
                        Reset
                    </button>
                </div>

            </div>

        </div>
    </div>


    <!-- CARD -->
    <div class="card shadow-sm border-0 main-card">

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0 user-table">

                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User</th>
                            <th>Phone</th>
                            <th>Voucher</th>
                            <th>Sponsor</th>
                            <th>Status</th>
                            <th>Wallet</th>
                            <th>Joined</th>
                            <th class="text-right">Action</th>
                        </tr>
                    </thead>

                    <tbody id="user-table"></tbody>

                </table>

            </div>

            <!-- PAGINATION -->
            <div id="pagination" class="pagination-box"></div>

        </div>

    </div>

</div>


<style>

/* REMOVE GAP */
.content.px-3 {
    padding-left: 0 !important;
    padding-right: 0 !important;
}

/* FILTER CARD */
.filter-card {
    border-radius: 10px;
    background: #f8f9fb;
}

/* SEARCH */
.search-box {
    width: 260px;
}

/* CARD */
.main-card {
    border-radius: 12px;
    overflow: hidden;
}

/* TABLE HEADER */
.user-table thead {
    background: #f4f6f9;
    font-size: 12px;
    text-transform: uppercase;
}

/* ROW HOVER */
.user-table tbody tr:hover {
    background: #eef5ff;
}

/* USER BLOCK */
.user-block {
    display: flex;
    align-items: center;
    gap: 10px;
}

.user-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #28a745, #1e7e34);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* STATUS */
.badge-pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}

.badge-approved {
    background: #e6f4ea;
    color: #28a745;
}

.badge-pending {
    background: #fff3cd;
    color: #856404;
}

/* WALLET */
.badge-active {
    background: #e7f3ff;
    color: #2a14ec;
}

.badge-inactive {
    background: #f8d7da;
    color: #dc3545;
}

/* VOUCHER */
.badge-voucher {
    background: #eef2ff;
    color: #4e73df;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 10px;
}

/* PAGINATION */
.pagination-box {
    padding: 10px 15px;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    background: #fafafa;
}

</style>


<script>
const token = localStorage.getItem("access");

if (!token) {
    window.location.href = "/api/accounts/admin/login/";
}

let usersData = [];
let currentPage = 1;


// LOAD USERS
function loadUsers(page = 1) {
    currentPage = page;

    fetch(`/api/accounts/admin/users/?page=${page}`, {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
        usersData = data.results || [];
        renderTable(usersData);
        renderPagination(data);
    });
}


// APPLY FILTERS
function applyFilters() {
    const status = document.getElementById("statusFilter").value;
    const wallet = document.getElementById("walletFilter").value;

    let filtered = usersData;

    if (status !== "") {
        filtered = filtered.filter(u => String(u.is_approved) === status);
    }

    if (wallet !== "") {
        filtered = filtered.filter(u => String(u.is_wallet_active) === wallet);
    }

    renderTable(filtered);
}


// RESET
function resetFilters() {
    document.getElementById("statusFilter").value = "";
    document.getElementById("walletFilter").value = "";
    renderTable(usersData);
}


// TABLE
function renderTable(users) {
    const table = document.getElementById("user-table");

    if (!users.length) {
        table.innerHTML = `<tr><td colspan="9" class="text-center py-5 text-muted">No users</td></tr>`;
        return;
    }

    let html = "";

    users.forEach((u, i) => {

        html += `
        <tr>
            <td>${i + 1}</td>

            <td>
                <div class="user-block">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <div class="font-weight-bold">${u.name || "-"}</div>
                        <small class="text-muted">${u.user_id}</small>
                    </div>
                </div>
            </td>

            <td>${u.phone || "-"}</td>

            <td>${u.voucher_code ? `<span class="badge-voucher">${u.voucher_code}</span>` : "-"}</td>

            <td>${u.sponsor_name || "-"}</td>

            <td>
                ${
                    u.is_approved
                    ? `<span class="badge-pill badge-approved">Approved</span>`
                    : `<span class="badge-pill badge-pending">Pending</span>`
                }
            </td>

            <td>
                ${
                    u.is_wallet_active
                    ? `<span class="badge-pill badge-active">Active</span>`
                    : `<span class="badge-pill badge-inactive">Inactive</span>`
                }
            </td>

            <td>${formatDate(u.joined_at)}</td>

            <td class="text-right">
                <button class="btn btn-sm btn-outline-primary"
                    onclick="viewUser(${u.id})">
                    <i class="fas fa-eye"></i>
                </button>
            </td>
        </tr>`;
    });

    table.innerHTML = html;
}


// PAGINATION
function renderPagination(data) {

    let html = `<div><small>Total: ${data.count}</small></div><div>`;

    if (data.previous) {
        html += `<button class="btn btn-sm btn-outline-primary mr-2"
            onclick="loadUsers(${currentPage - 1})">Prev</button>`;
    }

    if (data.next) {
        html += `<button class="btn btn-sm btn-outline-primary"
            onclick="loadUsers(${currentPage + 1})">Next</button>`;
    }

    html += `</div>`;

    document.getElementById("pagination").innerHTML = html;
}


// SEARCH
document.getElementById("searchInput").addEventListener("input", function() {
    const val = this.value.toLowerCase();

    const filtered = usersData.filter(u =>
        (u.name || "").toLowerCase().includes(val) ||
        (u.phone || "").includes(val) ||
        (u.user_id || "").toLowerCase().includes(val)
    );

    renderTable(filtered);
});


// DATE
function formatDate(d) {
    return d ? new Date(d).toLocaleDateString() : "-";
}


// NAVIGATION
function viewUser(id) {
    window.location.href = `/api/accounts/panel/users/${id}/`;
}


// INIT
loadUsers();
</script>

{% endblock %}
