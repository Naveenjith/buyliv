<!doctype html>
<html>
  <head>
    <title>Buyliv Admin</title>

    <!-- AdminLTE + Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      .brand-text {
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .nav-sidebar .nav-link {
        border-radius: 6px;
        margin: 4px 8px;
        transition: all 0.2s ease;
      }

      .nav-sidebar .nav-link:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .nav-sidebar .nav-link.active {
        background-color: #93c1c7 !important;
        color: #fff !important;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }

      .nav-sidebar .nav-icon {
        width: 20px;
      }

      .user-panel .info a {
        font-weight: 500;
      }

      .content-wrapper {
        background-color: #f4f6f9;
      }

      .sidebar {
        padding-top: 10px;
      }

      .nav-sidebar .nav-item {
        margin-bottom: 2px;
      }
    </style>
  </head>

  <body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">
      <!-- 🔷 NAVBAR -->
      <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left -->
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu" href="#">
              <i class="fas fa-bars"></i>
            </a>
          </li>
        </ul>

        <!-- Right -->
        <ul class="navbar-nav ml-auto">
          <!-- Logout -->
          <li class="nav-item">
            <a href="#" onclick="logout()" class="nav-link text-danger">
              <i class="fas fa-sign-out-alt"></i> Logout
            </a>
          </li>
        </ul>
      </nav>

      <!-- 🔷 SIDEBAR -->
      <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <!-- Brand -->
        <a href="/api/accounts/panel/dashboard/" class="brand-link text-center">
          <i class="fas fa-layer-group mr-2" style="color: #dde5df"></i>
          <span class="brand-text" style="color: #fefefe">Buyliv Admin</span>
        </a>

        <div class="sidebar">
          <!-- User -->
          <div class="user-panel mt-3 pb-3 mb-3 d-flex">
            <div class="image">
              <i class="fas fa-user-circle fa-2x" style="color: #93c1c7"></i>
            </div>
            <div class="info">
              <a href="#" class="d-block" style="color: #ffffff">
                {{ request.user.username }}
              </a>
            </div>
          </div>

          <nav>
            <ul class="nav nav-pills nav-sidebar flex-column">
              <!-- DASHBOARD -->
              <li class="nav-item">
                <a
                  href="/api/accounts/panel/dashboard/"
                  class="nav-link {% if 'dashboard' in request.path %}active{% endif %}"
                >
                  <i
                    class="nav-icon fas fa-chart-line"
                    style="color: #ffffff"
                  ></i>
                  <p style="color: #ffffff">Dashboard</p>
                </a>
              </li>

              <!-- USER MANAGEMENT -->
              <li class="nav-header" style="color: #eff5f0">USER MANAGEMENT</li>

              <li class="nav-item">
                <a
                  href="/api/accounts/panel/users/"
                  class="nav-link {% if 'users' in request.path %}active{% endif %}"
                >
                  <i class="nav-icon fas fa-users" style="color: #f5f9f6"></i>
                  <p style="color: #ffffff">Users</p>
                </a>
              </li>

              <li class="nav-item">
                <a
                  href="/api/accounts/panel/pending/"
                  class="nav-link {% if 'pending' in request.path %}active{% endif %}"
                >
                  <i class="nav-icon fas fa-clock" style="color: #f6f6f6"></i>
                  <p style="color: #ffffff">Pending Requests</p>
                </a>
              </li>

              <li class="nav-item">
                <a
                  href="/api/accounts/panel/create-user/"
                  class="nav-link {% if 'create-user' in request.path %}active{% endif %}"
                >
                  <i
                    class="nav-icon fas fa-user-plus"
                    style="color: #f2f3f8"
                  ></i>
                  <p style="color: #ffffff">Add User</p>
                </a>
              </li>

              <li class="nav-item">
                <a
                  href="/api/wallet/payout/earnings/"
                  class="nav-link {% if 'earnings' in request.path %}active{% endif %}"
                >
                  <i class="nav-icon fas fa-wallet" style="color: #fafbfe"></i>
                  <p style="color: #ffffff">Earnings</p>
                </a>
              </li>

              <li class="nav-item">
                <a
                  href="/api/accounts/admin/payouts/"
                  class="nav-link {% if 'payouts' in request.path %}active{% endif %}"
                >
                  <i
                    class="nav-icon fas fa-money-check-alt"
                    style="color: #fcfdff"
                  ></i>
                  <p style="color: #ffffff">Payout Requests</p>
                </a>
              </li>

              <!-- MLM CONFIG -->
              <li class="nav-header" style="color: #eff5f0">MLM CONFIG</li>

              <li class="nav-item">
                <a
                  href="/api/voucher/panel/plans/"
                  class="nav-link {% if 'plans' in request.path %}active{% endif %}"
                >
                  <i
                    class="nav-icon fas fa-layer-group"
                    style="color: #ffffff"
                  ></i>
                  <p style="color: #ffffff">Plans</p>
                </a>
              </li>

              <!-- 🔥 NEW: VOUCHERS -->
              <li class="nav-item">
                <a
                  href="/api/accounts/panel/vouchers/"
                  class="nav-link {% if 'vouchers' in request.path %}active{% endif %}"
                >
                  <i
                    class="nav-icon fas fa-ticket-alt"
                    style="color: #ffffff"
                  ></i>
                  <p style="color: #ffffff">Vouchers</p>
                </a>
              </li>

              <li class="nav-item">
                <a
                  href="/api/wallet/panel/levels/"
                  class="nav-link {% if 'levels' in request.path %}active{% endif %}"
                >
                  <i class="nav-icon fas fa-sitemap" style="color: #ffffff"></i>
                  <p style="color: #ffffff">Levels</p>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </aside>

      <!-- 🔷 CONTENT -->
      <div class="content-wrapper">
        <!-- Header -->
        <!-- <div class="content-header">
            <div class="container-fluid">
                <h4 class="mb-2">{% block page_title %}Dashboard{% endblock %}</h4>
            </div>
        </div> -->

        <!-- Main -->
        <section class="content px-3 pb-3">
          {% block content %}{% endblock %}
        </section>
      </div>
    </div>

    <!-- 🔷 LOGOUT SCRIPT -->
    <script>
      function logout() {
        const refresh = localStorage.getItem("refresh");
        const access = localStorage.getItem("access");

        fetch("/api/accounts/logout/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + access,
          },
          body: JSON.stringify({ refresh: refresh }),
        }).finally(() => {
          localStorage.clear();
          window.location.href = "/api/accounts/admin/login/";
        });
      }
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- ✅ Bootstrap 4 (correct for AdminLTE 3) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ✅ AdminLTE -->
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  </body>
</html>
