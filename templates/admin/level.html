{% extends "admin/base.html" %}
{% block content %}

<section class="content">
<div class="container-fluid py-3">

<!-- TOAST -->
<div id="toast-container"></div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-icon">
            <i class="fas fa-trash-alt"></i>
        </div>

        <h5 class="mt-2">Delete Level?</h5>
        <p class="text-muted small mb-3">This action cannot be undone</p>

        <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-danger px-4" id="confirmYes">
                <i class="fas fa-trash mr-1"></i> Delete
            </button>
            <button class="btn btn-light px-4" onclick="closeModal()">
                Cancel
            </button>
        </div>
    </div>
</div>

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="font-weight-bold">
            <i class="fas fa-sitemap text-success mr-2"></i>
            Level Commission
        </h3>
        <small class="text-muted">MLM distribution structure</small>
    </div>

    <div class="badge badge-light shadow-sm p-2">
        <i class="fas fa-layer-group mr-1"></i>
        Levels: <span id="levelCount">0</span>
    </div>
</div>

<div class="row">

<!-- FORM -->
<div class="col-lg-4">
    <div class="card glass-card border-0">
        <div class="card-body" style="background-color: rgb(183, 233, 194);">

            <h5 class="mb-3" style="color: black;">
                <i class="fas fa-plus-circle"></i> Add Level
            </h5>

            <form id="levelForm">
                <input type="hidden" id="level_id">

                <input type="number" id="level" class="form-control input-modern mb-3" placeholder="Level">
                <input type="number" step="0.01" id="percentage" class="form-control input-modern mb-3" placeholder="Percentage">

                <button class="btn btn-gradient w-100" id="submitBtn">
                    <i class="fas fa-save mr-1"></i> Save Level
                </button>
            </form>

        </div>
    </div>
</div>

<!-- CARDS -->
<div class="col-lg-8">
    <div class="row" id="levelGrid"></div>

    <div id="emptyState" class="text-center text-muted py-5 d-none">
        <i class="fas fa-layer-group mb-2" style="font-size:30px;"></i>
        <p>No levels created</p>
    </div>
</div>

</div>
</div>
</section>

<style>

/* ===== TOAST ===== */
#toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

.toast {
    padding: 12px 16px;
    border-radius: 8px;
    color: #fff;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(-10px);
    transition: 0.3s;
    min-width: 220px;
    font-size: 14px;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast-success { background:#28a745; }
.toast-error { background:#dc3545; }
.toast-warning { background:#ffc107; color:#000; }

/* ===== MODAL ===== */
.modal-overlay {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-card {
    background:#fff;
    padding:30px;
    border-radius:16px;
    text-align:center;
    width:320px;
    animation:fadeIn 0.3s ease;
}

.modal-icon {
    width:60px;
    height:60px;
    background:#ffeaea;
    color:#dc3545;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    margin:auto;
    font-size:22px;
}

@keyframes fadeIn {
    from { transform:scale(0.9); opacity:0; }
    to { transform:scale(1); opacity:1; }
}

/* ===== CARDS ===== */
.level-card {
    border-radius:14px;
    padding:18px;
    color:#fff;
    height:140px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
    transition:0.2s;
}

.level-card:hover {
    transform:translateY(-5px);
}

.level-1 { background:linear-gradient(135deg,#007bff,#00c6ff); }
.level-2 { background:linear-gradient(135deg,#28a745,#20c997); }
.level-3 { background:linear-gradient(135deg,#6610f2,#6f42c1); }
.level-4 { background:linear-gradient(135deg,#fd7e14,#ffc107); }
.level-default { background:linear-gradient(135deg,#6c757d,#adb5bd); }

.level-actions {
    position:absolute;
    top:10px;
    right:10px;
}

.level-actions button {
    background:rgba(255,255,255,0.2);
    border:none;
    color:#fff;
    margin-left:5px;
    border-radius:6px;
    padding:4px 8px;
}

/* ===== FORM ===== */
.input-modern {
    border-radius:10px;
    border:1px solid #ddd;
}

.btn-gradient {
    background:linear-gradient(135deg,#28a745,#20c997);
    color:#fff;
    border-radius:30px;
}

</style>

<script>
const token = localStorage.getItem("access");

let cache=[];
let deleteId=null;

/* TOAST */
function showToast(msg,type="success"){
    const el=document.createElement("div");
    el.className=`toast toast-${type}`;
    el.innerText=msg;
    document.getElementById("toast-container").appendChild(el);

    setTimeout(()=>el.classList.add("show"),100);
    setTimeout(()=>el.remove(),3000);
}

/* MODAL */
function openModal(id){
    deleteId=id;
    document.getElementById("confirmModal").style.display="flex";
}
function closeModal(){
    deleteId=null;
    document.getElementById("confirmModal").style.display="none";
}

/* DELETE */
document.getElementById("confirmYes").onclick=()=>{
    fetch(`/api/wallet/admin/levels/${deleteId}/`,{
        method:"DELETE",
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>{
        if(!res.ok) throw new Error();
        showToast("Level deleted","warning");
        closeModal();
        loadLevels();
    })
    .catch(()=>showToast("Delete failed","error"));
};

/* LOAD */
function loadLevels(){
    fetch("/api/wallet/admin/levels/",{
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>res.json())
    .then(data=>{
        cache=data;
        levelCount.innerText=data.length;

        if(!data.length){
            emptyState.classList.remove("d-none");
            levelGrid.innerHTML="";
            return;
        }

        emptyState.classList.add("d-none");

        let html="";
        data.forEach(l=>{
            const cls = `level-${l.level<=4 ? l.level : 'default'}`;

            html+=`
            <div class="col-md-4 mb-3">
                <div class="level-card ${cls}">
                    <div class="level-actions">
                        <button onclick="edit(${l.id})"><i class="fas fa-edit"></i></button>
                        <button onclick="openModal(${l.id})"><i class="fas fa-trash"></i></button>
                    </div>

                    <div><strong>Level ${l.level}</strong></div>
                    <div style="font-size:22px;font-weight:bold">${l.percentage}%</div>
                </div>
            </div>`;
        });

        levelGrid.innerHTML=html;
    });
}

/* CREATE / UPDATE */
levelForm.addEventListener("submit",async function(e){
    e.preventDefault();

    const id=level_id.value;

    if(!level.value || !percentage.value){
        showToast("All fields required","warning");
        return;
    }

    const payload={
        level:level.value,
        percentage:percentage.value
    };

    let url="/api/wallet/admin/levels/";
    let method="POST";

    if(id){
        url=`/api/wallet/admin/levels/${id}/`;
        method="PUT";
    }

    try{
        const res=await fetch(url,{
            method,
            headers:{
                "Content-Type":"application/json",
                Authorization:"Bearer "+token
            },
            body:JSON.stringify(payload)
        });

        const data=await res.json();

        if(!res.ok){
            const msg =
                data.level?.[0] ||
                data.percentage?.[0] ||
                data.detail ||
                "Validation error";
            showToast(msg,"error");
            return;
        }

        showToast(id?"Updated successfully":"Created successfully","success");
        resetForm();
        loadLevels();

    }catch{
        showToast("Server error","error");
    }
});

/* EDIT */
function edit(id){
    const l=cache.find(x=>x.id===id);
    level_id.value=l.id;
    level.value=l.level;
    percentage.value=l.percentage;
}

/* RESET */
function resetForm(){
    levelForm.reset();
    level_id.value="";
}

/* INIT */
loadLevels();
</script>

{% endblock %}
