{% extends "admin/base.html" %}
{% block content %}

<div class="container-fluid">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="mb-0">Payout Management</h3>
            <small class="text-muted">Manage all user payout requests</small>
        </div>
        <button class="btn btn-outline-secondary" onclick="loadPayouts(1)">Refresh</button>
    </div>
    <div class="Excel">
    <button class="btn btn-success" onclick="exportExcel()">
        Export Excel
    </button>
    </div>

    <!-- SUMMARY -->
    <div class="row mb-4 text-center">

        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="text-muted">Total</h6>
                    <h3 id="totalCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-warning text-dark">
                <div class="card-body">
                    <h6>Pending</h6>
                    <h3 id="pendingCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-success text-white">
                <div class="card-body">
                    <h6>Approved</h6>
                    <h3 id="approvedCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-danger text-white">
                <div class="card-body">
                    <h6>Rejected</h6>
                    <h3 id="rejectedCount">0</h3>
                </div>
            </div>
        </div>

    </div>

    <!-- FILTER -->
    <div class="card shadow-sm mb-4">
        <div class="card-body row g-3">

            <div class="col-md-3">
                <input type="text" id="searchUser" class="form-control" placeholder="User ID">
            </div>

            <div class="col-md-2">
                <select id="statusFilter" class="form-control">
                    <option value="">All</option>
                    <option value="PENDING">Pending</option>
                    <option value="APPROVED">Approved</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>

            <div class="col-md-2">
                <input type="date" id="fromDate" class="form-control">
            </div>

            <div class="col-md-2">
                <input type="date" id="toDate" class="form-control">
            </div>

            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-primary w-100" onclick="applyFilters()">Apply</button>
                <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Reset</button>
            </div>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-body table-responsive">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Admin</th>
                        <th>Final</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>

                <tbody id="payoutTable"></tbody>
            </table>

            <div class="d-flex justify-content-between mt-3">
                <button id="prevBtn" class="btn btn-outline-secondary">Prev</button>
                <span id="pageInfo"></span>
                <button id="nextBtn" class="btn btn-outline-secondary">Next</button>
            </div>

        </div>
    </div>

</div>
<style>
    
.Excel{
    padding: 20px;
}

</style>

<script>
const token = localStorage.getItem("access");

let currentPage = 1;
let nextPage = null;
let prevPage = null;
let debounceTimer = null;

// APPLY FILTERS
function applyFilters() {
    loadPayouts(1); // 🔥 ALWAYS RESET PAGE
}

// REMOVE debounce (it’s causing noise)
// COMMENT THIS OUT 👇
// document.getElementById("searchUser").addEventListener("input", ...)

async function loadPayouts(page = 1) {

    currentPage = page;

    const user = document.getElementById("searchUser").value.trim();
    const from = document.getElementById("fromDate").value;
    const to = document.getElementById("toDate").value;
    const status = document.getElementById("statusFilter").value;

    let url = `/api/accounts/payout/list/?page=${page}`;

    if (user) url += `&user=${user}`;
    if (from) url += `&from_date=${from}`;
    if (to) url += `&to_date=${to}`;
    if (status) url += `&status=${status}`;

    const table = document.getElementById("payoutTable");
    table.innerHTML = `<tr><td colspan="8" class="text-center">Loading...</td></tr>`;

    try {
        const res = await fetch(url, {
            headers: { "Authorization": "Bearer " + token }
        });

        const data = await res.json();

        console.log("API RESPONSE:", data);

        // 🔥 STRICT HANDLING
        const results = data.results ? data.results : [];

        document.getElementById("totalCount").innerText = data.count || 0;

        let pending = 0, approved = 0, rejected = 0;

        table.innerHTML = "";

        if (results.length === 0) {
            table.innerHTML = `<tr><td colspan="8" class="text-center text-muted">No results</td></tr>`;
        }

        results.forEach((p, index) => {

            if (p.status === "PENDING") pending++;
            if (p.status === "APPROVED") approved++;
            if (p.status === "REJECTED") rejected++;

            let badge = `<span class="badge bg-warning">Pending</span>`;
            if (p.status === "APPROVED") badge = `<span class="badge bg-success">Approved</span>`;
            if (p.status === "REJECTED") badge = `<span class="badge bg-danger">Rejected</span>`;

            let actions = "-";

            if (p.status === "PENDING") {
                actions = `
                    <button class="btn btn-success btn-sm" onclick="handleAction(${p.id}, 'approve')">Approve</button>
                    <button class="btn btn-danger btn-sm" onclick="handleAction(${p.id}, 'reject')">Reject</button>
                `;
            }

            table.innerHTML += `
                <tr>
                    <td>${(page - 1) * 10 + index + 1}</td>
                    <td>${p.user_id}</td>
                    <td>₹ ${p.amount}</td>
                    <td>₹ ${p.admin_charge}</td>
                    <td>₹ ${p.final_amount}</td>
                    <td>${badge}</td>
                    <td>${new Date(p.created_at).toLocaleString()}</td>
                    <td>${actions}</td>
                </tr>
            `;
        });

        document.getElementById("pendingCount").innerText = pending;
        document.getElementById("approvedCount").innerText = approved;
        document.getElementById("rejectedCount").innerText = rejected;

        nextPage = data.next;
        prevPage = data.previous;

        document.getElementById("nextBtn").disabled = !nextPage;
        document.getElementById("prevBtn").disabled = !prevPage;

        document.getElementById("pageInfo").innerText =
            `Page ${page} | Total ${data.count}`;

    } catch (err) {
        console.error(err);
        table.innerHTML = `<tr><td colspan="8" class="text-danger">Error</td></tr>`;
    }
}

// ACTION
async function handleAction(id, action) {
    if (!confirm(`Confirm ${action}?`)) return;

    await fetch(`/api/accounts/payout/action/${id}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ action })
    });

    loadPayouts(currentPage);
}

async function exportExcel() {
    const token = localStorage.getItem("access");

    let url = `/api/wallet/payout/export/`;

    const user = document.getElementById("searchUser").value.trim();
    const from = document.getElementById("fromDate").value;
    const to = document.getElementById("toDate").value;
    const status = document.getElementById("statusFilter").value;

    if (user) url += `?user=${user}`;
    if (from) url += `&from_date=${from}`;
    if (to) url += `&to_date=${to}`;
    if (status) url += `&status=${status}`;

    const res = await fetch(url, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const blob = await res.blob();
    const link = document.createElement("a");

    link.href = window.URL.createObjectURL(blob);
    link.download = "payouts.xlsx";
    link.click();
}

// PAGINATION
document.getElementById("nextBtn").onclick = () => {
    if (nextPage) loadPayouts(currentPage + 1);
};

document.getElementById("prevBtn").onclick = () => {
    if (prevPage) loadPayouts(currentPage - 1);
};

// RESET
function resetFilters() {
    document.getElementById("searchUser").value = "";
    document.getElementById("fromDate").value = "";
    document.getElementById("toDate").value = "";
    document.getElementById("statusFilter").value = "";
    loadPayouts(1);
}

// INIT
loadPayouts();

</script>

{% endblock %}
