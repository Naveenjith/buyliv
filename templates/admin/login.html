<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>

<body class="hold-transition login-page">

<div class="login-box">

    <div class="login-logo">
        <b>Buyliv</b> Admin
    </div>

    <div class="card">
        <div class="card-body login-card-body">

            <p class="login-box-msg">Sign in to start your session</p>

            <!-- ERROR MESSAGE -->
            <p id="error-msg" style="color:red; display:none;"></p>

            <form id="loginForm">
                
                <div class="input-group mb-3">
                    <input type="text" id="username" class="form-control" placeholder="User ID" required>
                </div>

                <div class="input-group mb-3">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Login
                </button>

            </form>

        </div>
    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("error-msg");

    fetch("/api/accounts/api/admin/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.access) {
            // ✅ STORE TOKENS
            localStorage.setItem("access", data.access);
            localStorage.setItem("refresh", data.refresh);

            // ✅ REDIRECT TO DASHBOARD PAGE (TEMPLATE, NOT API)
            window.location.href = "/api/accounts/panel/dashboard/";
        } else {
            errorBox.style.display = "block";
            errorBox.innerText = data.error || "Invalid credentials";
        }
    })
    .catch(() => {
        errorBox.style.display = "block";
        errorBox.innerText = "Something went wrong";
    });
});
</script>

</body>
</html>
