{% extends "admin/base.html" %}
{% block content %}

<section class="content">
<div class="container-fluid py-3">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="font-weight-bold mb-1 text-dark">
            <i class="fas fa-layer-group mr-2" style="color: #28a745;"></i>
            Plans Management
        </h3>
        <small class="text-muted">Create, update and manage subscription plans</small>
    </div>
</div>

<div class="row">

<!-- FORM -->
<div class="col-lg-4">
    <div class="card border-0 shadow-lg glass-card">
        <div class="card-body p-4">

            <h5 id="formTitle" class="mb-4 font-weight-bold" style="color: black;">
                <i class="fas fa-plus-circle mr-2"></i>Create Plan
            </h5>

            <form id="planForm">
                <input type="hidden" id="plan_id">

                <div class="form-group">
                    <label>Plan Name</label>
                    <input type="text" id="name" class="form-control input-modern" required>
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" class="form-control input-modern" required>
                </div>

                <div class="form-group">
                    <label>Passive Income</label>
                    <select id="passive" class="form-control input-modern">
                        <option value="false">No Passive</option>
                        <option value="true">Has Passive</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Monthly Passive</label>
                    <input type="number" id="passive_amount" class="form-control input-modern">
                </div>

                <button class="btn btn-gradient w-100" id="submitBtn">
                    <i class="fas fa-plus mr-1"></i> Create Plan
                </button>

            </form>
        </div>
    </div>
</div>

<!-- CARD GRID -->
<div class="col-lg-8">
    <div class="row" id="planContainer"></div>
</div>

</div>
</div>
</section>

<!-- TOAST CONTAINER (🔥 FIXED) -->
<div id="toast-container"></div>

<!-- MODAL -->
<div id="confirmModal" class="custom-modal">
    <div class="modal-box">
        <h5>Confirm Delete</h5>
        <p class="text-muted">This action cannot be undone</p>

        <button class="btn btn-danger mr-2" id="confirmYes">
            <i class="fas fa-trash"></i> Delete
        </button>
        <button class="btn btn-light" onclick="closeModal()">Cancel</button>
    </div>
</div>

<style>
.content-wrapper .content { padding-left: 0 !important; }

.glass-card {
    border-radius: 16px;
    background: rgb(183, 233, 194);
}

.input-modern {
    border-radius: 10px;
    border: 1px solid #e2e6ea;
}

.btn-gradient {
    background: linear-gradient(135deg,#28a745,#20c997);
    border-radius: 30px;
    color: #fff;
    font-weight: 600;
}

.plan-card {
    border-radius: 16px;
    padding: 18px;
    background: linear-gradient(135deg,#037a72,#05e91f);
    position: relative;
}

.plan-title { color: white; font-weight: 700; }
.plan-amount { color: white; font-weight: bold; }

.badge-passive { background:#28a745; padding:5px 10px; border-radius:6px; color:#fff; }
.badge-none { background:#adb5bd; padding:5px 10px; border-radius:6px; color:#fff; }

.card-actions { position:absolute; top:10px; right:10px; }

.btn-icon { border:none; padding:6px 10px; border-radius:6px; }
.btn-edit { background:#e6e5e1; }
.btn-delete { background:#e60b20; color:#fff; }

.custom-modal {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#fff;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

#toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
}

.toast {
    padding: 12px;
    border-radius: 8px;
    color: #fff;
    margin-bottom: 10px;
}

.toast-success { background: #28a745; }
.toast-error { background: #dc3545; }
</style>

<script>

const token = localStorage.getItem("access");
if (!token) window.location.href = "/api/accounts/admin/login/";

let deleteId = null;
let planCache = [];

function showToast(message, type="success") {
    const container = document.getElementById("toast-container");
    if (!container) return; // 🔥 safety

    const el = document.createElement("div");
    el.className = `toast toast-${type}`;
    el.innerText = message;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function loadPlans() {
    fetch("/api/voucher/plans/", {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
        planCache = data;
        let html = "";

        data.forEach(p => {
            html += `
            <div class="col-md-6 mb-3">
                <div class="plan-card shadow-sm">
                    <div class="card-actions">
                        <button class="btn-icon btn-edit" onclick="editPlan(${p.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon btn-delete" onclick="deletePlan(${p.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>

                    <div class="plan-title">${p.name}</div>
                    <div class="plan-amount">₹${p.amount}</div>

                    ${
                        p.has_passive_income
                        ? `<span class="badge-passive">₹${p.passive_income_amount}/mo</span>`
                        : `<span class="badge-none">No Passive</span>`
                    }
                </div>
            </div>`;
        });

        planContainer.innerHTML = html;
    });
}

document.getElementById("planForm").addEventListener("submit", function(e){
    e.preventDefault();

    const nameEl = document.getElementById("name");
    const amountEl = document.getElementById("amount");
    const passiveEl = document.getElementById("passive");
    const passiveAmountEl = document.getElementById("passive_amount");
    const planIdEl = document.getElementById("plan_id");

    const payload = {
        name: nameEl.value.trim(),
        amount: Number(amountEl.value),
        has_passive_income: passiveEl.value === "true",
        passive_income_amount: passiveEl.value === "true"
            ? Number(passiveAmountEl.value)
            : 0
    };

    // VALIDATION
    if (!payload.name) return showToast("Plan name required","error");
    if (!payload.amount) return showToast("Enter valid amount","error");
    if (payload.has_passive_income && !payload.passive_income_amount)
        return showToast("Enter passive amount","error");

    let url = "/api/voucher/plans/";
    let method = "POST";

    if (planIdEl.value) {
        url = `/api/voucher/plans/${planIdEl.value}/`;
        method = "PUT";
    }

    fetch(url, {
        method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        showToast(data.message || "Done");
        resetForm();
        loadPlans();
    });
});

function editPlan(id) {
    const p = planCache.find(x => x.id === id);
    if (!p) return;

    plan_id.value = p.id;
    name.value = p.name;
    amount.value = p.amount;
    passive.value = p.has_passive_income.toString();
    passive_amount.value = p.passive_income_amount;

    handlePassiveToggle();
}

function deletePlan(id) {
    deleteId = id;
    confirmModal.style.display = "flex";
}

confirmYes.onclick = function () {
    fetch(`/api/voucher/plans/${deleteId}/`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
    })
    .then(() => {
        closeModal();
        loadPlans();
    });
};

function closeModal() {
    confirmModal.style.display = "none";
}

function handlePassiveToggle() {
    passive_amount.disabled = passive.value !== "true";
}

passive.addEventListener("change", handlePassiveToggle);

function resetForm() {
    planForm.reset();
    plan_id.value = "";
    handlePassiveToggle();
}

handlePassiveToggle();
loadPlans();

</script>

{% endblock %}
