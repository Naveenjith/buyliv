{% extends "admin/base.html" %}
{% block content %}

<section class="content">
<div class="container-fluid py-4">

<!-- TOAST -->
<div id="toast-container"></div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay">
    <div class="modal-card">
        <i class="fas fa-trash modal-icon"></i>
        <h5 class="mt-2 font-weight-bold">Delete Voucher?</h5>
        <p class="text-muted small">This action cannot be undone</p>

        <div class="mt-3 d-flex justify-content-center">
            <button class="btn btn-danger px-4 mr-2" id="confirmYes">Delete</button>
            <button class="btn btn-light px-4" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="font-weight-bold mb-1">
            <i class="fas fa-ticket-alt mr-2" style="color: #28a745;"   ></i>
            Voucher Management
        </h3>
        <small class="text-muted">Manage vouchers by plan type</small>
    </div>
</div>

<div class="row">

<!-- FORM -->
<div class="card2 col-lg-4 mb-4">
    <div class="card shadow-lg border-0 form-card">
        <div class="card-body">

            <h5 class="mb-3" style="color: black;">
                <i class="fas fa-plus-circle mr-1" style="color: black;"></i> Add Voucher
            </h5>

            <form id="voucherForm">
                <input type="hidden" id="voucher_id" >

                <input type="text" id="code" class="form-control mb-3"  style="border-color: #75eb90;"
                       placeholder="Enter voucher code" required>

                <select id="plan" class="form-control mb-3"  style="border-color: #75eb90;" required></select>

                <button class="btn btn-gradient w-100" id="submitBtn">
                    <i class="fas fa-save mr-1"></i> Save Level
                </button>
            </form>

        </div>
    </div>
</div>

<!-- LIST -->
<div class="col-lg-8">

    <h6 class="section-title " style="color: rgb(35, 99, 225);">
        <i class="fas fa-layer-group mr-1" style="color: #060606;"></i> MAIN VOUCHERS
    </h6>
    <div class="row" id="mainGrid"></div>

    <h6 class="section-title  mt-4"  style="color: rgb(35, 99, 225);">
        <i class="fas fa-user-tie mr-1" style="color: #030303;"></i> AGENT VOUCHERS
    </h6>
    <div class="row" id="agentGrid"></div>

    <!-- PAGINATION -->
    <div id="pagination" class="d-flex justify-content-between align-items-center mt-4"></div>

</div>

</div>
</div>
</section>

<style>

/* ===== TOAST ===== */
/* ===== PREMIUM TOAST ===== */
#toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 320px;
    height: 60px;
    justify-content: center;
    align-items: center;
}

.toast {
    position: relative;
    padding: 14px 16px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    animation: slideIn 3s ease;
    overflow: hidden;
    pointer-events: auto;
    cursor: default;
}

.toast-success {
    background: linear-gradient(135deg,#28a745,#20c997);
}

.toast-error {
    background: linear-gradient(135deg,#dc3545,#ff6b6b);
}

/* CLOSE BUTTON */
.toast-close {
    position: absolute;
    top: 6px;
    right: 10px;
    cursor: pointer;
    font-size: 14px;
    opacity: 0.8;
}
.toast-close:hover {
    opacity: 1;
}

/* PROGRESS BAR */
.toast-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: rgba(255,255,255,0.7);
    width: 100%;
    animation: progress 4s linear forwards;
}

/* ANIMATIONS */
@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0 }
    to { transform: translateX(0); opacity: 1 }
}

@keyframes slideOut {
    from { transform: translateX(0); opacity: 1 }
    to { transform: translateX(100%); opacity: 0 }
}

@keyframes progress {
    from { width: 100% }
    to { width: 0% }
}

/* ===== MODAL ===== */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 999999;
    justify-content: center;
    align-items: center;
}
.modal-card {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}
.modal-icon {
    font-size: 32px;
    color: #dc3545;
}

/* ===== FORM ===== */
.form-card {
    border-radius: 12px;
}

.btn-gradient {
    background:linear-gradient(135deg,#28a745,#20c997);
    color:#fff;
    border-radius:30px;
}
.btn-gradient:hover {
    opacity: 0.9;
}

/* ===== CARD ===== */
.voucher-card {
    position: relative;
    border-radius: 14px;
    padding: 18px;
    color: #fff;
    height: 140px;
    transition: all 0.2s ease;
}

.voucher-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.main-plan {
   background:linear-gradient(135deg,#2f04ed,#53a7db);
}
.agent-plan {
    background: linear-gradient(135deg,#037a72,#05e91f);
}

.used {
    opacity: 0.6;
}

/* ACTION BUTTONS */
.actions {
    position: absolute;
    top: 8px;
    right: 8px;
}
.actions button {
    border: none;
    background: rgba(255,255,255,0.25);
    color: #fff;
    margin-left: 4px;
    border-radius: 6px;
    padding: 5px 7px;
    cursor: pointer;
}

/* SECTION TITLE */
.section-title {
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* PAGINATION */
#pagination button {
    min-width: 100px;
}
.card-body{
    border-radius: 10px;
    background-color: rgb(183, 233, 194);
}
</style>

<script>
const token = localStorage.getItem("access");

let cache = [];
let deleteId = null;
let nextUrl = null;
let prevUrl = null;

/* =========================
   ✅ FIXED TOAST SYSTEM
========================= */
function showToast(message, type = "success") {
    const container = document.getElementById("toast-container");

    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;

    toast.innerHTML = `
        <span>${message}</span>
        <span class="toast-close">&times;</span>
    `;

    container.appendChild(toast);

    // Manual close
    toast.querySelector(".toast-close").onclick = () => {
        toast.remove();
    };

    // Auto remove after 6 seconds (stable timing)
    setTimeout(() => {
        if (toast.parentNode) {
            toast.remove();
        }
    }, 6000);
}

/* =========================
   MODAL
========================= */
function openModal(id){
    deleteId = id;
    confirmModal.style.display = "flex";
}
function closeModal(){
    confirmModal.style.display = "none";
}

/* =========================
   DELETE
========================= */
confirmYes.onclick = async () => {
    try{
        const res = await fetch(`/api/accounts/admin/vouchers/${deleteId}/`,{
            method:"DELETE",
            headers:{Authorization:"Bearer "+token}
        });

        if(!res.ok) throw new Error();

        showToast("Voucher deleted");
        closeModal();
        loadVouchers();

    }catch{
        showToast("Delete failed","error");
    }
};

/* =========================
   LOAD PLANS
========================= */
function loadPlans(){
    fetch("/api/voucher/plans/",{
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>res.json())
    .then(data=>{
        plan.innerHTML = `<option value="">Select Plan</option>`;
        data.forEach(p=>{
            plan.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        });
    });
}

/* =========================
   LOAD VOUCHERS
========================= */
function loadVouchers(url="/api/accounts/admin/vouchers/"){
    fetch(url,{
        headers:{Authorization:"Bearer "+token}
    })
    .then(res=>res.json())
    .then(data=>{
        cache = data.results || data;
        nextUrl = data.next;
        prevUrl = data.previous;

        let mainHTML="", agentHTML="";

        cache.forEach(v=>{
            const isAgent = v.plan_name?.toLowerCase().includes("agent");
            const cls = isAgent ? "agent-plan" : "main-plan";

            const card = `
            <div class="col-md-4 mb-3">
                <div class="voucher-card ${cls} ${v.is_used?'used':''}">

                    <div class="actions">
                        <button onclick="edit(${v.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="openModal(${v.id})" ${v.is_used?'disabled':''}>
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>

                    <div>
                        <strong>${v.code}</strong><br>
                        <small>${v.plan_name}</small>
                    </div>

                    <div>${v.is_used ? "USED" : "ACTIVE"}</div>

                </div>
            </div>`;

            isAgent ? agentHTML += card : mainHTML += card;
        });

        mainGrid.innerHTML = mainHTML;
        agentGrid.innerHTML = agentHTML;

        pagination.innerHTML = `
            <button class="btn btn-light" ${!prevUrl?"disabled":""}
                onclick="loadVouchers('${prevUrl}')">Prev</button>
            <button class="btn btn-light" ${!nextUrl?"disabled":""}
                onclick="loadVouchers('${nextUrl}')">Next</button>
        `;
    });
}

/* =========================
   ✅ FIXED EDIT FUNCTION
========================= */
function edit(id){
    const v = cache.find(x => x.id === id);
    if(!v){
        showToast("Voucher not found","error");
        return;
    }

    voucher_id.value = v.id;
    code.value = v.code;
    plan.value = v.plan;

    submitBtn.innerHTML = `<i class="fas fa-edit mr-1"></i> Update Voucher`;
}

/* =========================
   CREATE / UPDATE
========================= */
voucherForm.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const id = voucher_id.value;

    const payload = {
        code: code.value,
        plan: plan.value
    };

    let url = "/api/accounts/admin/vouchers/";
    let method = "POST";

    if(id){
        url = `/api/accounts/admin/vouchers/${id}/`;
        method = "PUT";
    }

    try{
        const res = await fetch(url,{
            method,
            headers:{
                "Content-Type":"application/json",
                Authorization:"Bearer "+token
            },
            body:JSON.stringify(payload)
        });

        const data = await res.json();

        if(!res.ok){
            let msg =
                data.code?.[0] ||
                data.non_field_errors?.[0] ||
                data.errors?.[0] ||
                data.detail ||
                "Something went wrong";

            showToast(msg,"error");
            return;
        }

        showToast(id ? "Voucher updated" : "Voucher created");

        voucherForm.reset();
        voucher_id.value = "";
        submitBtn.innerHTML = `<i class="fas fa-save mr-1"></i> Save Voucher`;

        loadVouchers();

    }catch{
        showToast("Network error","error");
    }
});

/* INIT */
loadPlans();
loadVouchers();
</script>

{% endblock %}
