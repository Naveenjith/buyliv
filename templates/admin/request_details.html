{% extends "admin/base.html" %}
{% block content %}

<div class="container-fluid">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="text-muted">Verify before approval</h6>

        <a href="/api/accounts/panel/pending/" class="btn btn-outline-secondary">
            ← Back
        </a>
    </div>

    <!-- TOAST -->
    <div id="toast-container"></div>

    <div class="row">

        <!-- USER -->
        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">

                    <i class="fas fa-user-circle fa-5x text-primary mb-2"></i>

                    <h5 id="name">--</h5>
                    <p class="text-muted" id="phone">--</p>
                    <span class="badge badge-warning px-3 py-1">
                        Pending Verification
                    </span>

                    <hr>

                    <p><b>Address</b></p>
                    <p class="text-muted" id="address"></p>

                </div>
            </div>
        </div>

        <!-- DETAILS -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">

                    <!-- BANK -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label>Bank</label>
                            <input id="bank" class="form-control" readonly>
                        </div>
                        <div class="col-md-6">
                            <label>IFSC</label>
                            <input id="ifsc" class="form-control" readonly>
                        </div>
                    </div>

                    <!-- IMAGES -->
                    <div class="row text-center">
                        <div class="col-md-6">
                            <label>Aadhaar Front</label>
                            <img id="aadhaar_front" class="img-fluid border p-2">
                        </div>

                        <div class="col-md-6">
                            <label>Aadhaar Back</label>
                            <img id="aadhaar_back" class="img-fluid border p-2">
                        </div>
                    </div>

                    <hr>

                    <!-- ACTION -->
                    <div>

                        <label><b>Select Voucher</b></label>

                        <div class="d-flex gap-2 mb-3">
                            <select id="voucher" class="form-control"></select>

                            <button id="approveBtn" onclick="confirmApprove()" class="btn btn-success">
                                ✔ Approve
                            </button>
                        </div>

                        <button id="rejectBtn" onclick="confirmReject()" class="btn btn-danger">
                            ✖ Reject
                        </button>

                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

<!-- MODAL -->
<div id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:20px; border-radius:10px; text-align:center; width:300px;">
        <p id="modalText"></p>

        <button id="modalYes" class="btn btn-primary btn-sm">Yes</button>
        <button onclick="closeModal()" class="btn btn-secondary btn-sm ml-2">Cancel</button>
    </div>
</div>

<script>
const token = localStorage.getItem("access");
const id = "{{ request_id }}";

if (!token) window.location.href = "/api/accounts/admin/login/";

// 🔥 TOAST
function showToast(msg, type="success") {
    const el = document.createElement("div");
    el.className = `bg-${type} text-white px-3 py-2`;
    el.style = "position:fixed;top:20px;right:20px;border-radius:6px;z-index:9999;";
    el.innerText = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// 🔥 MODAL
let modalCallback = null;

function openModal(text, callback) {
    document.getElementById("modalText").innerText = text;
    modalCallback = callback;
    document.getElementById("modalOverlay").style.display = "flex";
}

function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
}

// modal YES click
document.getElementById("modalYes").onclick = function() {
    if (modalCallback) modalCallback();
    closeModal();
};

// 🔥 FETCH
function fetchWithAuth(url, options={}) {
    options.headers = {
        ...(options.headers || {}),
        "Authorization": "Bearer " + token
    };

    return fetch(url, options).then(res => res.json());
}

// 🔥 LOAD VOUCHERS
function loadVouchers() {
    fetchWithAuth("/api/accounts/admin/vouchers/")
    .then(data => {
        let html = "<option value=''>Select Voucher</option>";

        data.forEach(v => {
            if (!v.is_used) {
                html += `<option value="${v.id}">${v.code} (${v.plan_name})</option>`;
            }
        });

        document.getElementById("voucher").innerHTML = html;
    });
}

// 🔥 LOAD REQUEST
function loadRequest() {
    fetchWithAuth(`/api/accounts/admin/request/${id}/`)
    .then(data => {
        document.getElementById("name").innerText = data.name || "-";
        document.getElementById("phone").innerText = data.phone || "-";
        document.getElementById("address").innerText = data.address || "-";

        bank.value = data.bank_account_number;
        ifsc.value = data.ifsc_code;

        aadhaar_front.src = data.aadhaar_front;
        aadhaar_back.src = data.aadhaar_back;
    });
}

// 🔥 APPROVE FLOW
function confirmApprove() {
    openModal("Approve this request?", doApprove);
}

function doApprove() {
    const voucher = document.getElementById("voucher").value;

    if (!voucher) {
        showToast("Select voucher", "danger");
        return;
    }

    const btn = document.getElementById("approveBtn");
    btn.innerText = "Processing...";
    btn.disabled = true;

    fetchWithAuth(`/api/accounts/admin/request/${id}/approve/`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ voucher_id: voucher })
    })
    .then(res => {
        if (res.error) {
            showToast(res.error, "danger");
            btn.innerText = "✔ Approve";
            btn.disabled = false;
        } else {
            showToast("Approved successfully", "success");
            setTimeout(() => window.location.href = "/api/accounts/panel/pending/", 1000);
        }
    });
}

// 🔥 REJECT FLOW
function confirmReject() {
    openModal("Reject this request?", doReject);
}

function doReject() {
    const btn = document.getElementById("rejectBtn");
    btn.innerText = "Processing...";
    btn.disabled = true;

    fetchWithAuth(`/api/accounts/admin/request/${id}/reject/`, {
        method: "POST"
    })
    .then(() => {
        showToast("Rejected successfully", "warning");
        setTimeout(() => window.location.href = "/api/accounts/panel/pending/", 1000);
    });
}

// INIT
loadVouchers();
loadRequest();

</script>

{% endblock %}
